services:
  - type: web
    name: wafervision-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: https://wafer-map-pattern-system.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: ^https://wafer-map-pattern-system(?:-[a-z0-9-]+)?\.vercel\.app$
